<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>단식 타이머</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header .icon { font-size: 22px; }
  header h1 { font-size: 18px; font-weight: 600; }
  .container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

  /* Protocol selector */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #8b949e;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .proto-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .proto-btn {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 12px 4px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .proto-btn:active { transform: scale(0.96); }
  .proto-btn.active {
    background: #0d2818;
    border-color: #1d9e75;
  }
  .proto-ratio {
    font-size: 15px;
    font-weight: 600;
    color: #e6edf3;
  }
  .proto-btn.active .proto-ratio { color: #3fb983; }
  .proto-label {
    font-size: 11px;
    color: #8b949e;
    margin-top: 3px;
  }
  .proto-btn.active .proto-label { color: #1d9e75; }

  /* Timer ring */
  .ring-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 24px 16px 20px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .ring-wrap { position: relative; width: 220px; height: 220px; }
  .ring-wrap svg { width: 100%; height: 100%; }
  .ring-bg { fill: none; stroke: #21262d; stroke-width: 16; }
  .ring-fg {
    fill: none;
    stroke: #1d9e75;
    stroke-width: 16;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }
  .ring-info {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 140px;
  }
  .elapsed-time {
    font-size: 34px;
    font-weight: 700;
    color: #e6edf3;
    letter-spacing: -1px;
    line-height: 1;
  }
  .goal-label {
    font-size: 12px;
    color: #8b949e;
    margin-top: 6px;
  }
  .remain-label {
    font-size: 11px;
    color: #8b949e;
    margin-top: 3px;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 99px;
    margin-top: 16px;
    font-weight: 500;
  }
  .pill-idle { background: #21262d; color: #8b949e; }
  .pill-fasting { background: #0d2818; color: #3fb983; border: 1px solid #1d9e75; }
  .pill-done { background: #0d2015; color: #56d364; }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Main button */
  .main-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    border: none;
    transition: all 0.15s;
  }
  .main-btn:active { transform: scale(0.98); }
  .btn-start { background: #1d9e75; color: #fff; }
  .btn-start:hover { background: #17825f; }
  .btn-stop { background: transparent; color: #f85149; border: 1px solid #f85149; }
  .btn-stop:hover { background: #2a1010; }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 14px 8px;
    text-align: center;
  }
  .stat-val { font-size: 22px; font-weight: 700; color: #e6edf3; }
  .stat-lbl { font-size: 11px; color: #8b949e; margin-top: 4px; }

  /* History */
  .history-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 16px;
  }
  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #21262d;
  }
  .history-item:last-child { border-bottom: none; }
  .hist-date { font-size: 14px; color: #e6edf3; }
  .hist-dur { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .hist-badge {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 99px;
  }
  .badge-ok { background: #0d2818; color: #3fb983; }
  .badge-miss { background: #21262d; color: #8b949e; }
  .empty { text-align: center; color: #8b949e; font-size: 14px; padding: 24px 0; }

  /* Tip banner */
  .tip {
    background: #0d1f3a;
    border: 1px solid #1c4080;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: #79b8f3;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .tip strong { color: #a8d0f8; }
</style>
</head>
<body>

<header>
  <span class="icon">⏱️</span>
  <h1>간헐적 단식 타이머</h1>
</header>

<div class="container">

  <div class="tip">
    💡 <strong>홈 화면에 추가하면 앱처럼 쓸 수 있어요!</strong><br>
    브라우저 메뉴(⋮) → <strong>홈 화면에 추가</strong>
  </div>

  <div class="section-label">단식 방법 선택</div>
  <div class="proto-grid">
    <div class="proto-btn active" data-fast="16"><div class="proto-ratio">16:8</div><div class="proto-label">기본</div></div>
    <div class="proto-btn" data-fast="18"><div class="proto-ratio">18:6</div><div class="proto-label">중급</div></div>
    <div class="proto-btn" data-fast="20"><div class="proto-ratio">20:4</div><div class="proto-label">고급</div></div>
    <div class="proto-btn" data-fast="23"><div class="proto-ratio">23:1</div><div class="proto-label">OMAD</div></div>
  </div>

  <div class="ring-card">
    <div class="ring-wrap">
      <svg viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="90"/>
        <circle class="ring-fg" id="ring" cx="110" cy="110" r="90"/>
      </svg>
      <div class="ring-info">
        <div class="elapsed-time" id="elapsed-text">00:00:00</div>
        <div class="goal-label" id="goal-text">목표 16시간</div>
        <div class="remain-label" id="remain-text">남은 16:00:00</div>
      </div>
    </div>
    <div class="status-pill pill-idle" id="status-pill">단식 중이 아님</div>
    <button class="main-btn btn-start" id="main-btn">🍽️ 단식 시작</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl">연속 성공</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">총 횟수</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-rate">0%</div><div class="stat-lbl">성공률</div></div>
  </div>

  <div class="section-label">최근 기록</div>
  <div class="history-card">
    <div id="history-list"><div class="empty">아직 기록이 없어요 🌱</div></div>
  </div>

</div>

<script>
const CIRC = 2 * Math.PI * 90;
let goalHours = 16, isFasting = false, startTime = null, tick = null;
const ring = document.getElementById('ring');
ring.style.strokeDasharray = CIRC;
ring.style.strokeDashoffset = CIRC;

function fmt(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return [h,m,s].map(v=>String(v).padStart(2,'0')).join(':');
}

function updateRing(elapsed) {
  const goal = goalHours * 3600;
  const pct = Math.min(elapsed / goal, 1);
  ring.style.strokeDashoffset = CIRC * (1 - pct);
  ring.style.stroke = pct >= 1 ? '#56d364' : '#1d9e75';
  document.getElementById('elapsed-text').textContent = fmt(elapsed);
  document.getElementById('goal-text').textContent = `목표 ${goalHours}시간`;
  const rem = Math.max(goal - elapsed, 0);
  document.getElementById('remain-text').textContent = rem > 0 ? `남은 ${fmt(rem)}` : '🎉 목표 달성!';
}

function setBadge(state) {
  const pill = document.getElementById('status-pill');
  if (state === 'fasting') {
    pill.className = 'status-pill pill-fasting';
    pill.innerHTML = '<span class="dot"></span> 단식 중';
  } else if (state === 'done') {
    pill.className = 'status-pill pill-done';
    pill.innerHTML = '🎉 목표 달성!';
  } else {
    pill.className = 'status-pill pill-idle';
    pill.innerHTML = '단식 중이 아님';
  }
}

document.querySelectorAll('.proto-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (isFasting) return;
    goalHours = parseInt(btn.dataset.fast);
    document.querySelectorAll('.proto-btn').forEach(b => b.classList.toggle('active', b === btn));
    updateRing(0);
    saveSession();
  });
});

document.getElementById('main-btn').addEventListener('click', () => {
  if (!isFasting) {
    isFasting = true;
    startTime = Date.now();
    saveSession();
    tick = setInterval(tickFn, 1000);
    setBadge('fasting');
    const btn = document.getElementById('main-btn');
    btn.textContent = '⏹ 단식 중단';
    btn.className = 'main-btn btn-stop';
  } else {
    stopFasting();
  }
});

function tickFn() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  updateRing(elapsed);
  if (elapsed >= goalHours * 3600) setBadge('done');
}

function stopFasting() {
  isFasting = false;
  clearInterval(tick);
  tick = null;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const success = elapsed >= goalHours * 3600;
  const hist = loadHistory();
  hist.unshift({ date: new Date(startTime).toLocaleDateString('ko-KR'), dur: elapsed, goal: goalHours, ok: success });
  saveHistory(hist.slice(0, 30));
  clearSession();
  startTime = null;
  ring.style.strokeDashoffset = CIRC;
  ring.style.stroke = '#1d9e75';
  document.getElementById('elapsed-text').textContent = '00:00:00';
  document.getElementById('remain-text').textContent = `남은 ${fmt(goalHours*3600)}`;
  setBadge('idle');
  const btn = document.getElementById('main-btn');
  btn.textContent = '🍽️ 단식 시작';
  btn.className = 'main-btn btn-start';
  renderAll();
}

function saveSession() {
  localStorage.setItem('fs_session', JSON.stringify({ goal: goalHours, start: startTime, active: isFasting }));
}
function clearSession() { localStorage.removeItem('fs_session'); }
function loadHistory() { try { return JSON.parse(localStorage.getItem('fs_history') || '[]'); } catch(e) { return []; } }
function saveHistory(h) { localStorage.setItem('fs_history', JSON.stringify(h)); }

function renderAll() {
  const hist = loadHistory();
  const el = document.getElementById('history-list');
  if (!hist.length) { el.innerHTML = '<div class="empty">아직 기록이 없어요 🌱</div>'; }
  else {
    el.innerHTML = hist.slice(0,10).map(h => `
      <div class="history-item">
        <div><div class="hist-date">${h.date}</div><div class="hist-dur">${fmt(h.dur)} / 목표 ${h.goal}시간</div></div>
        <div class="hist-badge ${h.ok ? 'badge-ok' : 'badge-miss'}">${h.ok ? '성공' : '중단'}</div>
      </div>`).join('');
  }
  const total = hist.length;
  const ok = hist.filter(h => h.ok).length;
  let streak = 0; for (const h of hist) { if (h.ok) streak++; else break; }
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-rate').textContent = total ? Math.round(ok/total*100) + '%' : '0%';
}

// Restore session
(function() {
  try {
    const s = JSON.parse(localStorage.getItem('fs_session') || 'null');
    if (s && s.active) {
      goalHours = s.goal;
      startTime = s.start;
      isFasting = true;
      document.querySelectorAll('.proto-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.fast) === goalHours));
      tick = setInterval(tickFn, 1000);
      setBadge('fasting');
      const btn = document.getElementById('main-btn');
      btn.textContent = '⏹ 단식 중단';
      btn.className = 'main-btn btn-stop';
      tickFn();
    } else if (s) {
      goalHours = s.goal;
      document.querySelectorAll('.proto-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.fast) === goalHours));
      updateRing(0);
    }
  } catch(e) {}
  renderAll();
})();
</script>
</body>
</html>
